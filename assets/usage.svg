<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" font-family="'SFMono-Regular','Menlo','Monaco','Consolas','Liberation Mono','Courier New',monospace" font-size="13">
  <style>
    .bg { fill: #1e1e2e; }
    .title-bar { fill: #313244; }
    .btn-close { fill: #f38ba8; }
    .btn-min { fill: #f9e2af; }
    .btn-max { fill: #a6e3a1; }
    .prompt { fill: #89b4fa; }
    .cmd { fill: #cdd6f4; }
    .label { fill: #bac2de; }
    .flag { fill: #89b4fa; }
    .desc { fill: #a6adc8; }
    .def { fill: #6c7086; }
    .dim { fill: #585b70; }
  </style>
  <rect class="bg" width="680" height="420" rx="10"/>
  <rect class="title-bar" width="680" height="36" rx="10"/>
  <rect class="title-bar" y="20" width="680" height="16"/>
  <circle class="btn-close" cx="20" cy="18" r="6"/>
  <circle class="btn-min" cx="40" cy="18" r="6"/>
  <circle class="btn-max" cx="60" cy="18" r="6"/>
  <text x="340" y="22" text-anchor="middle" class="dim" font-size="12">dns-inspector</text>

  <text y="66" x="16">
    <tspan class="prompt">❯ </tspan><tspan class="cmd">dns-inspector -h</tspan>
  </text>
  <text y="90" x="16"><tspan class="label">Usage of dns-inspector:</tspan></text>
  <text y="114" x="16"><tspan class="flag">&#160;&#160;-debug</tspan></text>
  <text y="134" x="16"><tspan class="desc">&#160;&#160;&#160;&#160;&#160;&#160;Print full request/response JSON</tspan></text>
  <text y="158" x="16"><tspan class="flag">&#160;&#160;-domain</tspan><tspan class="desc"> string</tspan></text>
  <text y="178" x="16"><tspan class="desc">&#160;&#160;&#160;&#160;&#160;&#160;Domain name to query (must end with .) </tspan><tspan class="def">(default "api.github.com.")</tspan></text>
  <text y="202" x="16"><tspan class="flag">&#160;&#160;-server</tspan><tspan class="desc"> string</tspan></text>
  <text y="222" x="16"><tspan class="desc">&#160;&#160;&#160;&#160;&#160;&#160;DNS server address (host:port) </tspan><tspan class="def">(default "1.1.1.1:53")</tspan></text>
  <text y="246" x="16"><tspan class="flag">&#160;&#160;-timeout</tspan><tspan class="desc"> uint</tspan></text>
  <text y="266" x="16"><tspan class="desc">&#160;&#160;&#160;&#160;&#160;&#160;Query timeout in seconds </tspan><tspan class="def">(default 3)</tspan></text>
  <text y="290" x="16"><tspan class="flag">&#160;&#160;-type</tspan><tspan class="desc"> string</tspan></text>
  <text y="310" x="16"><tspan class="desc">&#160;&#160;&#160;&#160;&#160;&#160;Query type (A, AAAA, TXT, MX, etc.) </tspan><tspan class="def">(default "A")</tspan></text>
  <text y="334" x="16"><tspan class="flag">&#160;&#160;-udpsize</tspan><tspan class="desc"> uint</tspan></text>
  <text y="354" x="16"><tspan class="desc">&#160;&#160;&#160;&#160;&#160;&#160;EDNS0 UDP payload size (0-65535, use 0 to test truncation) </tspan><tspan class="def">(default 4096)</tspan></text>
  <text y="378" x="16"><tspan class="flag">&#160;&#160;-version</tspan></text>
  <text y="398" x="16"><tspan class="desc">&#160;&#160;&#160;&#160;&#160;&#160;Show version information</tspan></text>
</svg>
